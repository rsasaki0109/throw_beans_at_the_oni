<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Oni Blaster - Bean Throwing Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        h1 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
        }
        #game-container {
            position: relative;
            border: 4px solid #ffd700;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        canvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 70%, #228B22 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: clamp(1rem, 4vw, 1.5rem);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            pointer-events: none;
        }
        #start-screen, #result-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            color: white;
            text-align: center;
            padding: 20px;
        }
        #start-screen h2, #result-screen h2 {
            font-size: clamp(1.5rem, 6vw, 3rem);
            margin-bottom: 20px;
            color: #ffd700;
        }
        #result-screen .score {
            font-size: clamp(2rem, 8vw, 4rem);
            color: #ff6b6b;
            margin: 20px 0;
        }
        .btn {
            background: linear-gradient(180deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: clamp(1rem, 4vw, 1.5rem);
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .instructions {
            color: #aaa;
            margin-top: 15px;
            font-size: clamp(0.8rem, 3vw, 1rem);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <h1>Oni Blaster</h1>
    <div id="game-container">
        <canvas id="game"></canvas>
        <div id="ui">
            <span id="score">Score: 0</span>
            <span id="timer">Time: 10</span>
        </div>
        <div id="start-screen">
            <h2>Bean Throwing Battle</h2>
            <p>10 seconds to defeat the Oni!</p>
            <button class="btn" id="start-btn">START</button>
            <p class="instructions">Click/Tap or Hold Space to throw beans</p>
        </div>
        <div id="result-screen" class="hidden">
            <h2>Time Up!</h2>
            <p>Your Score:</p>
            <div class="score" id="final-score">0</div>
            <button class="btn" id="retry-btn">RETRY</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
